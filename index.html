<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Simple Calculator</title>
  <style>
    :root{
      --bg:#0f1724;
      --card:#0b1220;
      --accent:#4f46e5;
      --muted:#94a3b8;
      --glass: rgba(255,255,255,0.03);
      --button-size:68px;
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      background:linear-gradient(180deg,#071029 0%, #091426 100%);
      display:flex;align-items:center;justify-content:center;padding:28px;
      color:#e6eef8;
    }

    .calculator{
      width:360px;
      max-width:100%;
      background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border-radius:14px;
      box-shadow: 0 10px 30px rgba(2,6,23,0.6), inset 0 1px 0 rgba(255,255,255,0.02);
      padding:18px;
      border:1px solid rgba(255,255,255,0.04);
    }

    .brand{display:flex;align-items:center;gap:10px;margin-bottom:12px}
    .logo{
      width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#06b6d4);
      display:flex;align-items:center;justify-content:center;font-weight:700;color:white;box-shadow:0 6px 18px rgba(79,70,229,0.18);
    }
    .brand h1{font-size:16px;margin:0}
    .brand p{margin:0;font-size:12px;color:var(--muted)}

    .display{
      background:var(--glass);
      border-radius:10px;padding:14px 12px;margin-bottom:12px;min-height:72px;display:flex;flex-direction:column;justify-content:center;
    }
    .expr{font-size:16px;color:var(--muted);word-break:break-all;}
    .result{font-size:28px;font-weight:600;text-align:right;word-break:break-all}

    .pad{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
    button.key{
      height:var(--button-size);border-radius:10px;border:0;font-size:18px;font-weight:600;cursor:pointer;outline:none;
      box-shadow:0 6px 16px rgba(2,6,23,0.5);transition:transform .08s ease, box-shadow .08s ease;
      background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));color:inherit;border:1px solid rgba(255,255,255,0.03);
    }
    button.key:active{transform:translateY(2px);}

    button.op{background:linear-gradient(180deg,var(--accent),#2563eb);color:white}
    button.func{background:transparent;color:var(--muted);font-weight:700;border:1px solid rgba(255,255,255,0.03)}
    button.wide{grid-column:span 2}

    .hint{font-size:12px;color:var(--muted);text-align:center;margin-top:10px}

    @media (max-width:420px){
      .calculator{padding:12px}
      :root{--button-size:56px}
      .result{font-size:24px}
    }
  </style>
</head>
<body>
  <main class="calculator" role="application" aria-label="Simple calculator">
    <div class="brand">
      <div class="logo">C</div>
      <div>
        <h1>Simple Calculator</h1>
        <p>Basic arithmetic • Keyboard supported</p>
      </div>
    </div>

    <section class="display" aria-live="polite">
      <div id="expression" class="expr">0</div>
      <div id="result" class="result">0</div>
    </section>

    <section class="pad" role="group" aria-label="Calculator buttons">
      <button class="key func" data-action="clear" aria-label="clear">AC</button>
      <button class="key func" data-action="back" aria-label="backspace">⌫</button>
      <button class="key func" data-action="percent" aria-label="percent">%</button>
      <button class="key op" data-value="/" aria-label="divide">÷</button>

      <button class="key" data-value="7">7</button>
      <button class="key" data-value="8">8</button>
      <button class="key" data-value="9">9</button>
      <button class="key op" data-value="*" aria-label="multiply">×</button>

      <button class="key" data-value="4">4</button>
      <button class="key" data-value="5">5</button>
      <button class="key" data-value="6">6</button>
      <button class="key op" data-value="-" aria-label="minus">−</button>

      <button class="key" data-value="1">1</button>
      <button class="key" data-value="2">2</button>
      <button class="key" data-value="3">3</button>
      <button class="key op" data-value="+" aria-label="plus">+</button>

      <button class="key" data-value="0" class="zero">0</button>
      <button class="key" data-value="." aria-label="decimal">.</button>
      <button class="key op wide" data-action="equals" aria-label="equals">=</button>
    </section>

    <p class="hint">Tip: Use keyboard (numbers, + - * /, Enter, Backspace).</p>
  </main>

  <script>
    (function(){
      const exprEl = document.getElementById('expression');
      const resEl = document.getElementById('result');
      let expression = '';
      let lastResult = null;

      function updateDisplay(){
        exprEl.textContent = expression || '0';
        resEl.textContent = lastResult === null ? '0' : String(lastResult);
      }

      function sanitizeForEval(input){
        // Allow digits, operators, parentheses, decimal point and whitespace
        if(!/^[0-9()+\-*/.%\s]*$/.test(input)) return null;
        // Replace unicode multiplication/division if present
        return input.replace(/×/g,'*').replace(/÷/g,'/').replace(/−/g,'-');
      }

      function compute(expr){
        const safe = sanitizeForEval(expr);
        if(safe === null) throw new Error('Invalid characters');
        // Convert percentage: e.g. 50% -> (50/100)
        // We'll replace occurrences like number% with (number/100)
        const withPercent = safe.replace(/(\d+(?:\.\d+)?)%/g,'($1/100)');
        // Double-check characters again
        if(!/^[0-9()+\-*/.\s]*$/.test(withPercent)) throw new Error('Unsafe expression');
        // Evaluate using Function in a narrow scope
        // eslint-disable-next-line no-new-func
        const fn = new Function('return ' + withPercent);
        const result = fn();
        if(typeof result === 'number' && isFinite(result)) return result;
        throw new Error('Math error');
      }

      function press(value){
        if(value === '=') return evaluate();
        if(value === 'AC'){
          expression = '';
          lastResult = null;
          updateDisplay();
          return;
        }
        if(value === '⌫'){
          expression = expression.slice(0,-1);
          updateDisplay();
          return;
        }
        expression += value;
        updateDisplay();
      }

      function evaluate(){
        try{
          if(!expression) return;
          const result = compute(expression);
          lastResult = Number.isInteger(result) ? result : parseFloat(result.toFixed(10));
          expression = String(lastResult);
          updateDisplay();
        }catch(e){
          lastResult = 'Error';
          updateDisplay();
        }
      }

      // handle clicks
      document.querySelectorAll('button.key').forEach(btn=>{
        btn.addEventListener('click', ()=>{
          const v = btn.getAttribute('data-value');
          const action = btn.getAttribute('data-action');
          if(action === 'clear') return press('AC');
          if(action === 'back') return press('⌫');
          if(action === 'percent') return press('%');
          if(action === 'equals') return press('=');
          if(v !== null) return press(v);
        });
      });

      // keyboard support
      window.addEventListener('keydown', (e)=>{
        if(e.key === 'Enter') { e.preventDefault(); evaluate(); return; }
        if(e.key === 'Backspace'){ e.preventDefault(); expression = expression.slice(0,-1); updateDisplay(); return; }
        if(e.key === 'Escape'){ e.preventDefault(); expression=''; lastResult=null; updateDisplay(); return; }
        // map x/X to *
        if(e.key === 'x' || e.key === 'X') { expression += '*'; updateDisplay(); return; }
        // allowed keys: digits, operators, parentheses, dot, %
        if(/^[0-9+\-*/().%]$/.test(e.key)){
          expression += e.key;
          updateDisplay();
          return;
        }
      });

      // initialize
      updateDisplay();

    })();
  </script>
</body>
</html>
